{% extends "admin/change_list.html" %}

{% block content %}
<!-- 수리 세트 관리 버튼 영역 -->
<div style="
    margin-bottom: 20px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #f8f7ff 0%, #eef2ff 100%);
    border-radius: 10px;
    border: 1px solid #e0ddf5;
    display: flex;
    align-items: center;
    justify-content: space-between;
">
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:1.3rem;">📦</span>
        <div>
            <span style="font-weight:700; color:#4338ca; font-size:0.9rem;">수리 세트 관리</span>
            <span style="color:#6b7280; font-size:0.8rem; margin-left:6px;">
                자주 사용하는 부품 조합을 세트로 등록하세요
            </span>
        </div>
    </div>
    <div style="display:flex; gap:8px;">
        <a href="{{ preset_url }}" style="
               padding: 8px 16px;
               border-radius: 8px;
               background: #fff;
               border: 2px solid #6366f1;
               color: #4338ca;
               font-size: 0.82rem;
               font-weight: 600;
               text-decoration: none;
               transition: all .2s ease;
               display: inline-flex;
               align-items: center;
               gap: 4px;
           " onmouseover="this.style.background='#eef2ff'" onmouseout="this.style.background='#fff'">
            📋 세트 목록 ({{ preset_count }}개)
        </a>
        <a href="{{ preset_add_url }}" style="
               padding: 8px 16px;
               border-radius: 8px;
               background: #6366f1;
               border: 2px solid #6366f1;
               color: #fff;
               font-size: 0.82rem;
               font-weight: 600;
               text-decoration: none;
               transition: all .2s ease;
               display: inline-flex;
               align-items: center;
               gap: 4px;
           " onmouseover="this.style.background='#4f46e5'; this.style.borderColor='#4f46e5'"
            onmouseout="this.style.background='#6366f1'; this.style.borderColor='#6366f1'">
            ＋ 새 세트 등록
        </a>
    </div>
</div>

{{ block.super }}
{% endblock %}
