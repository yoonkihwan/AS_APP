{% extends "admin/change_form.html" %}
{% load i18n %}

{% block after_field_sets %}
{{ block.super }}

{% if repair_presets %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const presets = {{ repair_presets|safe }};
    const partsMeta = {{ parts_meta|safe }};
    if (!presets.length) return;

    // 부품 메타 정보 맵 생성 (id -> {part_type, price})
    const metaMap = {};
    partsMeta.forEach(function(p) {
        metaMap[p.id] = { part_type: p.part_type, price: p.price };
    });

    // 부품 테이블 위젯 영역 찾기
    const widget = document.querySelector('.parts-table-widget');
    if (!widget) return;

    // 활성 상태 추적
    const activePresets = new Set();

    // ── 프리셋 컨테이너 생성 ──
    const container = document.createElement('div');
    container.id = 'preset-container';
    container.style.cssText = 'margin-bottom:16px; padding:16px; background:linear-gradient(135deg, #f8f7ff 0%, #f0eeff 100%); border-radius:10px; border:1px solid #e0ddf5;';

    // 다크모드 대응
    if (document.documentElement.classList.contains('dark')) {
        container.style.background = 'linear-gradient(135deg, #1e1b4b 0%, #1e2040 100%)';
        container.style.borderColor = '#312e81';
    }

    // 헤더
    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.85rem; font-weight:700; color:#4338ca; margin-bottom:10px; display:flex; align-items:center; gap:6px;';
    header.innerHTML = '📦 수리 세트 빠른 적용 <span style="font-weight:400; color:#6b7280; font-size:0.78rem;">(여러 개 선택 가능 · 공임은 최고가 자동 선택)</span>';
    container.appendChild(header);

    // 버튼 영역
    const btnGroup = document.createElement('div');
    btnGroup.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px;';

    // ── 행 스타일 동기화 함수 ──
    function syncRowStyles() {
        widget.querySelectorAll('.parts-row').forEach(function(row) {
            const cb = row.querySelector('input[type="checkbox"]');
            if (cb) {
                row.classList.toggle('selected-row', cb.checked);
            }
        });
    }

    // ── 세트 적용 로직 ──
    function applyActivePresets() {
        // 모든 체크박스 해제
        const checkboxes = widget.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(function(cb) { cb.checked = false; });

        if (activePresets.size === 0) {
            syncRowStyles();
            return;
        }

        // 활성 세트들의 부품/공임 수집
        const allPartIds = new Set();
        const laborCandidates = []; // {id, price}

        activePresets.forEach(function(presetId) {
            const preset = presets.find(function(p) { return p.id === presetId; });
            if (!preset) return;

            // 부품 추가
            preset.part_ids.forEach(function(id) { allPartIds.add(id); });

            // 공임 후보 수집
            preset.labor_ids.forEach(function(id) {
                const meta = metaMap[id];
                if (meta) {
                    laborCandidates.push({ id: id, price: meta.price });
                }
            });
        });

        // 부품 체크
        allPartIds.forEach(function(id) {
            const cb = widget.querySelector('input[value="' + id + '"]');
            if (cb) cb.checked = true;
        });

        // 공임: 최고가 1개만 선택
        if (laborCandidates.length > 0) {
            laborCandidates.sort(function(a, b) { return b.price - a.price; });
            const highestLabor = laborCandidates[0];
            const cb = widget.querySelector('input[value="' + highestLabor.id + '"]');
            if (cb) cb.checked = true;
        }

        syncRowStyles();
    }

    // ── 세트 버튼 생성 ──
    presets.forEach(function(preset) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.dataset.presetId = preset.id;
        btn.textContent = preset.name + ' (' + preset.total_price.toLocaleString() + '원)';
        btn.style.cssText = 'padding:8px 16px; border-radius:8px; border:2px solid #6366f1; background:#fff; color:#4338ca; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all .2s ease;';

        btn.addEventListener('mouseenter', function() {
            if (!activePresets.has(preset.id)) {
                this.style.background = '#eef2ff';
            }
        });
        btn.addEventListener('mouseleave', function() {
            if (!activePresets.has(preset.id)) {
                this.style.background = '#fff';
            }
        });

        btn.addEventListener('click', function() {
            // 토글
            if (activePresets.has(preset.id)) {
                activePresets.delete(preset.id);
                this.style.background = '#fff';
                this.style.color = '#4338ca';
                this.style.borderColor = '#6366f1';
            } else {
                activePresets.add(preset.id);
                this.style.background = '#6366f1';
                this.style.color = '#fff';
                this.style.borderColor = '#6366f1';
            }

            // 전체 재계산
            applyActivePresets();
        });

        btnGroup.appendChild(btn);
    });

    // "초기화" 버튼
    const resetBtn = document.createElement('button');
    resetBtn.type = 'button';
    resetBtn.textContent = '✕ 전체 해제';
    resetBtn.style.cssText = 'padding:8px 16px; border-radius:8px; border:2px solid #d1d5db; background:#fff; color:#6b7280; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all .2s ease;';
    resetBtn.addEventListener('click', function() {
        activePresets.clear();
        const checkboxes = widget.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(function(cb) { cb.checked = false; });
        syncRowStyles();
        // 모든 세트 버튼 비활성화 스타일
        btnGroup.querySelectorAll('button').forEach(function(b) {
            if (b !== resetBtn) {
                b.style.background = '#fff';
                b.style.color = '#4338ca';
                b.style.borderColor = '#6366f1';
            }
        });
    });
    btnGroup.appendChild(resetBtn);

    container.appendChild(btnGroup);

    // 위젯 앞에 삽입
    widget.parentNode.insertBefore(container, widget);
});
</script>
{% endif %}
{% endblock %}
