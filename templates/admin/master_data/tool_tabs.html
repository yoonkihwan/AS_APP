<!-- 브랜드/툴 탭 네비게이션 (기준정보 포털용) -->
<div style="
    margin-bottom: 20px;
    border-bottom: 2px solid #e5e7eb;
    display: flex;
    gap: 0;
">
    <a href="{% url 'master_data_admin:master_data_tool_changelist' %}" id="tab-tool" style="
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 3px solid {% if active_tab == 'tool' %}#6366f1{% else %}transparent{% endif %};
            color: {% if active_tab == 'tool' %}#4338ca{% else %}#6b7280{% endif %};
            margin-bottom: -2px;
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
       "
        onmouseover="if('{{ active_tab }}' !== 'tool') { this.style.color='#4338ca'; this.style.borderBottomColor='#c7d2fe'; }"
        onmouseout="if('{{ active_tab }}' !== 'tool') { this.style.color='#6b7280'; this.style.borderBottomColor='transparent'; }">
        <span class="material-symbols-outlined" style="font-size:1.1rem;">hardware</span>
        장비/툴 관리
    </a>
    <a href="{% url 'master_data_admin:master_data_brand_changelist' %}" id="tab-brand" style="
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 3px solid {% if active_tab == 'brand' %}#6366f1{% else %}transparent{% endif %};
            color: {% if active_tab == 'brand' %}#4338ca{% else %}#6b7280{% endif %};
            margin-bottom: -2px;
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
       "
        onmouseover="if('{{ active_tab }}' !== 'brand') { this.style.color='#4338ca'; this.style.borderBottomColor='#c7d2fe'; }"
        onmouseout="if('{{ active_tab }}' !== 'brand') { this.style.color='#6b7280'; this.style.borderBottomColor='transparent'; }">
        <span class="material-symbols-outlined" style="font-size:1.1rem;">category</span>
        브랜드 관리
    </a>
</div>
